<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Design Team Dashboard</title>
  <meta name="description" content="브랜드 디자인팀 업무 현황 대시보드" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="white" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">Brand Design</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="사이드바 토글">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <ul>
        <li class="nav-item active" id="nav-dashboard" onclick="switchPage('dashboard')">
          <div class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
          </div>
          <span class="nav-label">대시보드</span>
        </li>
        <li class="nav-item" id="nav-tasks" onclick="switchPage('tasks')">
          <div class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
          </div>
          <span class="nav-label">할 일</span>
          <span class="nav-badge" id="taskBadge">0</span>
        </li>
        <li class="nav-item" id="nav-calendar" onclick="switchPage('calendar')">
          <div class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <span class="nav-label">캘린더</span>
        </li>
        <li class="nav-item" id="nav-notes" onclick="switchPage('notes')">
          <div class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </div>
          <span class="nav-label">메모</span>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="avatar" style="background:#a855f7">T</div>
        <div class="user-info">
          <div class="user-name">Team Dashboard</div>
          <div class="user-role">업무 현황</div>
        </div>
        <button class="settings-btn" aria-label="설정">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title" id="pageTitle">대시보드</h1>
        <div class="breadcrumb">
          <span class="current-date" id="currentDate"></span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="검색..." />
        </div>
        <button class="btn-secondary" onclick="localStorage.clear();location.reload()" style="font-size:12px;padding:6px 12px">업데이트</button>
        <button class="notification-btn" id="notificationBtn" aria-label="알림">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          <span class="notification-dot"></span>
        </button>
        <button class="theme-toggle" id="themeToggle" aria-label="테마 전환">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Pages -->

    <!-- DASHBOARD PAGE -->
    <div class="page active" id="page-dashboard">

      <!-- Summary Bar -->
      <div class="team-summary" id="teamSummary">
        <!-- Generated by JS -->
      </div>

      <!-- Team Workload Chart -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-header">
          <h2 class="card-title">팀 업무량</h2>
        </div>
        <div id="workloadChart" style="padding:20px"></div>
      </div>

      <!-- 요청 부서별 업무 현황 -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-header">
          <h2 class="card-title">요청 부서별 업무</h2>
        </div>
        <div id="requesterChart" style="padding:20px"></div>
      </div>

      <!-- 팀 일정 & 근태 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px" id="dashBottomGrid">

        <!-- 팀 일정 -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">팀 일정</h2>
            <button class="btn-add-task" onclick="openTeamEventModal()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              추가
            </button>
          </div>
          <div id="teamEventList" style="padding:8px 0"></div>
        </div>

        <!-- 근태 -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">개인 일정 (근태)</h2>
            <button class="btn-add-task" onclick="openScheduleModal()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              추가
            </button>
          </div>
          <div id="scheduleList" style="padding:8px 0"></div>
        </div>

      </div>

    </div>

    <!-- TASKS PAGE -->
    <div class="page" id="page-tasks">
      <div class="page-toolbar">
        <div class="filter-tabs">
          <button class="filter-tab active" id="filterAll" onclick="filterTasks('all')">전체</button>
          <button class="filter-tab" id="filterNew" onclick="filterTasks('new')">New</button>
          <button class="filter-tab" id="filterReady" onclick="filterTasks('ready')">Ready</button>
          <button class="filter-tab" id="filterOngoing" onclick="filterTasks('ongoing')">Ongoing</button>
          <button class="filter-tab" id="filterAlmostdone" onclick="filterTasks('almostdone')">Almost Done</button>
          <button class="filter-tab" id="filterDone" onclick="filterTasks('done')">Done</button>
          <button class="filter-tab" id="filterHold" onclick="filterTasks('hold')">Hold</button>
        </div>
        <button class="btn-primary" id="openAddTaskModal">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          새 할 일
        </button>
      </div>

      <!-- Member filter -->
      <div class="member-filter" id="memberFilter" style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap"></div>
      <!-- Requester filter -->
      <div class="requester-filter" id="requesterFilter" style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap"></div>

      <div class="tasks-kanban" id="tasksKanban">
        <div class="kanban-col" id="col-new">
          <div class="kanban-col-header">
            <div class="kanban-dot" style="background:#a855f7"></div>
            <span class="kanban-col-title">New</span>
            <span class="kanban-count" id="countNew">0</span>
          </div>
          <div class="kanban-cards" id="cards-new" ondragover="event.preventDefault()" ondrop="dropTask(event, 'new')"></div>
        </div>
        <div class="kanban-col" id="col-ready">
          <div class="kanban-col-header">
            <div class="kanban-dot" style="background:#6366f1"></div>
            <span class="kanban-col-title">Ready</span>
            <span class="kanban-count" id="countReady">0</span>
          </div>
          <div class="kanban-cards" id="cards-ready" ondragover="event.preventDefault()" ondrop="dropTask(event, 'ready')"></div>
        </div>
        <div class="kanban-col" id="col-ongoing">
          <div class="kanban-col-header">
            <div class="kanban-dot" style="background:#f59e0b"></div>
            <span class="kanban-col-title">Ongoing</span>
            <span class="kanban-count" id="countOngoing">0</span>
          </div>
          <div class="kanban-cards" id="cards-ongoing" ondragover="event.preventDefault()" ondrop="dropTask(event, 'ongoing')"></div>
        </div>
        <div class="kanban-col" id="col-almostdone">
          <div class="kanban-col-header">
            <div class="kanban-dot" style="background:#3b82f6"></div>
            <span class="kanban-col-title">Almost Done</span>
            <span class="kanban-count" id="countAlmostdone">0</span>
          </div>
          <div class="kanban-cards" id="cards-almostdone" ondragover="event.preventDefault()" ondrop="dropTask(event, 'almostdone')"></div>
        </div>
        <div class="kanban-col" id="col-done">
          <div class="kanban-col-header">
            <div class="kanban-dot" style="background:#10b981"></div>
            <span class="kanban-col-title">Done</span>
            <span class="kanban-count" id="countDone">0</span>
          </div>
          <div class="kanban-cards" id="cards-done" ondragover="event.preventDefault()" ondrop="dropTask(event, 'done')"></div>
        </div>
        <div class="kanban-col" id="col-hold">
          <div class="kanban-col-header">
            <div class="kanban-dot" style="background:#94a3b8"></div>
            <span class="kanban-col-title">Hold</span>
            <span class="kanban-count" id="countHold">0</span>
          </div>
          <div class="kanban-cards" id="cards-hold" ondragover="event.preventDefault()" ondrop="dropTask(event, 'hold')"></div>
        </div>
      </div>
    </div>

    <!-- PROJECTS PAGE -->
    <!-- CALENDAR PAGE -->
    <div class="page" id="page-calendar">
      <div class="calendar-layout">
        <div class="calendar-main">
          <div class="calendar-nav">
            <button class="cal-nav-btn" id="prevMonth" aria-label="이전 달">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <h2 class="cal-month-title" id="calMonthTitle"></h2>
            <button class="cal-nav-btn" id="nextMonth" aria-label="다음 달">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          <div class="calendar-grid" id="calendarGrid">
            <!-- Generated by JS -->
          </div>
        </div>
        <div class="calendar-sidebar">
          <div class="card" style="padding: 20px;">
            <h3 class="card-title" id="selectedDateTitle">일정 추가</h3>
            <div class="event-form">
              <input type="text" class="form-input" id="eventTitle" placeholder="일정 제목" />
              <input type="time" class="form-input" id="eventTime" />
              <select class="form-input" id="eventColor">
                <option value="#6366f1">보라 (미팅)</option>
                <option value="#10b981">초록 (완료)</option>
                <option value="#f59e0b">노랑 (중요)</option>
                <option value="#ec4899">핑크 (개인)</option>
              </select>
              <button class="btn-primary" id="addEventBtn" style="width:100%; margin-top:8px;">일정 추가</button>
            </div>
            <div class="upcoming-events-list" id="sidebarEventList">
              <h4 style="margin: 16px 0 8px; font-size: 13px; color: var(--text-secondary);">선택된 날의 일정</h4>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- NOTES PAGE -->
    <div class="page" id="page-notes">
      <div class="page-toolbar">
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="filterNotes('all')">전체</button>
          <button class="filter-tab" onclick="filterNotes('important')">중요</button>
        </div>
        <button class="btn-primary" id="openAddNoteModal">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          새 메모
        </button>
      </div>
      <div class="notes-grid" id="notesGrid">
        <!-- Generated by JS -->
      </div>
    </div>

  </main>

  <!-- Modals -->
  <!-- Add Task Modal -->
  <div class="modal-overlay" id="addTaskModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="addTaskTitle">
      <div class="modal-header">
        <h3 id="addTaskTitle">새 할 일 추가</h3>
        <button class="modal-close" id="closeAddTaskModal" aria-label="닫기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">제목 *</label>
          <input type="text" class="form-input" id="taskTitle" placeholder="할 일을 입력하세요" />
        </div>
        <div class="form-group">
          <label class="form-label">설명</label>
          <textarea class="form-input form-textarea" id="taskDesc" placeholder="상세 내용을 입력하세요"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">예상 완료일</label>
            <input type="date" class="form-input" id="taskDue" />
          </div>
          <div class="form-group">
            <label class="form-label">업무 사이즈</label>
            <select class="form-input" id="taskSize">
              <option value="S">S (반나절 이내)</option>
              <option value="M" selected>M (1~3일)</option>
              <option value="L">L (1주일 내외)</option>
              <option value="XL">XL (2주 이상)</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">우선순위</label>
            <select class="form-input" id="taskPriority">
              <option value="low">낮음</option>
              <option value="medium" selected>보통</option>
              <option value="high">높음</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">요청팀</label>
            <select class="form-input" id="taskRequester">
              <option value="">선택</option>
              <option value="commerce">commerce</option>
              <option value="content">content</option>
              <option value="O2O">O2O</option>
              <option value="offline">offline</option>
              <option value="Team">Team</option>
              <option value="Space AI">Space AI</option>
              <option value="Life Event">Life Event</option>
              <option value="Home">Home</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">상태</label>
            <select class="form-input" id="taskStatus">
              <option value="new">New</option>
              <option value="ready">Ready</option>
              <option value="ongoing" selected>Ongoing</option>
              <option value="almostdone">Almost Done</option>
              <option value="done">Done</option>
              <option value="hold">Hold</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelAddTask">취소</button>
        <button class="btn-primary" id="confirmAddTask">추가하기</button>
      </div>
    </div>
  </div>

  <!-- Add Project Modal -->
  <!-- Add Note Modal -->
  <div class="modal-overlay" id="addNoteModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="addNoteTitle">
      <div class="modal-header">
        <h3 id="addNoteTitle">새 메모 추가</h3>
        <button class="modal-close" id="closeAddNoteModal" aria-label="닫기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">제목 *</label>
          <input type="text" class="form-input" id="noteTitle" placeholder="메모 제목을 입력하세요" />
        </div>
        <div class="form-group">
          <label class="form-label">내용</label>
          <textarea class="form-input form-textarea" id="noteContent" placeholder="메모 내용을 입력하세요" style="min-height:120px;"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">색상</label>
            <select class="form-input" id="noteColor">
              <option value="#6366f1">보라</option>
              <option value="#10b981">초록</option>
              <option value="#f59e0b">노랑</option>
              <option value="#ec4899">핑크</option>
            </select>
          </div>
          <div class="form-group" style="display:flex;align-items:flex-end;">
            <label class="checkbox-label">
              <input type="checkbox" id="noteImportant" />
              <span>중요 메모</span>
            </label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelAddNote">취소</button>
        <button class="btn-primary" id="confirmAddNote">추가하기</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
